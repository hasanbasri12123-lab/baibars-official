<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Marketplace Saya</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.card{
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
    height:250px;
    object-fit:cover;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<span class="navbar-brand d-flex align-items-center">

<img
src="https://drive.google.com/thumbnail?id=17UT5gXDP2ZEDDHsux9w2R0h_TxrCkVic&sz=w1000"
alt="Logo Marketplace"
style="
height:50px;
width:50px;
object-fit:cover;
border-radius:10px;
margin-right:10px;
background:white;
padding:3px;
">

BAIBARS OFFICIAL SHOP

</span>

</div>

</nav>

<div class="container mt-4">

<div class="row">

<!-- PRODUK -->

<div class="col-md-8">

<h2>Daftar Produk</h2>

<div class="row" id="produkContainer">

Loading...

</div>

</div>

<!-- KERANJANG -->

<div class="col-md-4">

<div class="card">

<div class="card-header bg-success text-white">
Keranjang Belanja
</div>

<div class="card-body">

<div id="cartItems">
Belum ada produk
</div>

<hr>

<h5>
Total :
Rp <span id="cartTotal">0</span>
</h5>

<input
type="text"
id="nama"
class="form-control mb-2"
placeholder="Nama Pembeli">

<input
type="text"
id="hp"
class="form-control mb-2"
placeholder="Nomor HP / WhatsApp">

<textarea
id="alamat"
class="form-control mb-2"
placeholder="Alamat Lengkap"></textarea>

<button
class="btn btn-success w-100"
onclick="checkout()">

Checkout

</button>
<div class="mt-3">

<a
href="https://wa.me/6281231471885?text=Halo%20Admin,%20saya%20ingin%20bertanya%20tentang%20produk."
target="_blank"
class="btn btn-success w-100">

💬 Chat Penjual

</a>


</div>

</div>

</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbx21YfLTYfo_Oc04M7MSVQ44BliO-4I5CAdHXlHcOrXASVNgek8WnUuarN5_oPQvsW4Rw/exec";

let cart = [];
let dataGlobal = [];

fetch(API_URL + "?action=getProducts")
.then(response => response.json())
.then(data => {

dataGlobal = data;

let html = "";

data.forEach(item => {

html += `

<div class="col-md-6">

<div class="card mb-4">

<img
src="${item.foto}"
class="card-img-top">

<div class="card-body">

<h4>${item.nama}</h4>

<p>${item.deskripsi}</p>

<p>
<b>Kategori :</b>
${item.kategori}
</p>

<p>
<b>Harga :</b>
Rp ${Number(item.harga).toLocaleString()}
</p>

<p>
<b>Stok :</b>
${item.stok}
</p>

<p>
<b>Warna :</b>
${item.warna}
</p>

<p>
<b>Ukuran :</b>
${item.ukuran}
</p>

<button
class="btn btn-primary w-100"
onclick="addToCart('${item.id}')">
Tambah Keranjang
</button>

</div>

</div>

</div>

`;

});

document.getElementById("produkContainer").innerHTML = html;

renderCart();

})
.catch(error => {

document.getElementById("produkContainer").innerHTML =
"Terjadi kesalahan memuat produk";

console.log(error);

});

function addToCart(id){

const produk =
dataGlobal.find(
p => p.id === id
);

if(!produk){
return;
}

let item =
cart.find(
p => p.id === id
);

if(item){

item.qty++;

}else{

cart.push({

id: produk.id,
nama: produk.nama,
harga: Number(produk.harga),
qty: 1

});

}

renderCart();

}

function renderCart(){

let html = "";
let total = 0;

if(cart.length === 0){

html = "Belum ada produk";

}else{

cart.forEach(item => {

total += item.harga * item.qty;

html += `

<div class="border rounded p-2 mb-2">

<b>${item.nama}</b>

<br>

Qty : ${item.qty}

<br>

Rp ${(item.harga * item.qty).toLocaleString()}

</div>

`;

});

}

document.getElementById("cartItems").innerHTML = html;

document.getElementById("cartTotal").innerText =
total.toLocaleString();

}

async function checkout(){

if(cart.length === 0){

alert("Keranjang masih kosong");
return;

}

const nama =
document.getElementById("nama").value;

const hp =
document.getElementById("hp").value;

const alamat =
document.getElementById("alamat").value;

if(!nama || !hp || !alamat){

alert(
"Silakan lengkapi data pembeli"
);

return;

}

try{

const response =
await fetch(API_URL,{

method:"POST",

body: JSON.stringify({

action:"addOrder",

nama:nama,

hp:hp,

alamat:alamat,

items:cart

})

});

const result =
await response.json();

if(result.status){

alert(
"Pesanan berhasil dibuat\nNomor Order: "
+ result.orderId
);

cart = [];

renderCart();

document.getElementById("nama").value="";
document.getElementById("hp").value="";
document.getElementById("alamat").value="";

}else{

alert("Gagal menyimpan pesanan");

}

}catch(error){

console.log(error);

alert(
"Terjadi kesalahan saat checkout"
);

}

}

</script>


</a>

</body>
</html>
